services:
  koha:
    image: ${KOHA_IMAGE}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: ${KOHA_MEM_LIMIT:-2g}
    cpus: ${KOHA_CPUS:-1.50}
    # Host-published ports are intentionally disabled in production.
    # External access must go only through the Cloudflare tunnel service.
    # ports:
    #   - "${KOHA_OPAC_PORT:-8080}:${KOHA_OPAC_PORT:-8080}"
    #   - "${KOHA_INTRANET_PORT:-8081}:${KOHA_INTRANET_PORT:-8081}"
    networks:
      - kohanet
    cap_add:
      - DAC_READ_SEARCH
      - SYS_NICE
    environment:
      MYSQL_SERVER: ${DB_HOST:-db}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_ROOT_PASS: ${DB_ROOT_PASS}

      KOHA_INSTANCE: ${KOHA_INSTANCE}
      KOHA_DOMAIN: ${KOHA_DOMAIN}
      KOHA_CONF: /etc/koha/sites/${KOHA_INSTANCE}/koha-conf.xml
      KOHA_OPAC_PORT: ${KOHA_OPAC_PORT}
      KOHA_INTRANET_PORT: ${KOHA_INTRANET_PORT}
      KOHA_OPAC_PREFIX: ${KOHA_OPAC_PREFIX:-}
      KOHA_OPAC_SUFFIX: ${KOHA_OPAC_SUFFIX:-}
      KOHA_INTRANET_PREFIX: ${KOHA_INTRANET_PREFIX:-}
      KOHA_INTRANET_SUFFIX: ${KOHA_INTRANET_SUFFIX:--intra}
      KOHA_OPAC_SERVERNAME: ${KOHA_OPAC_SERVERNAME:-}
      KOHA_INTRANET_SERVERNAME: ${KOHA_INTRANET_SERVERNAME:-}
      TZ: ${KOHA_TIMEZONE}
      KOHA_LANGS: ${KOHA_LANGS:-}

      MB_HOST: ${MB_HOST:-rabbitmq}
      MB_PORT: ${MB_PORT:-61613}
      MB_USER: ${RABBITMQ_USER}
      MB_PASS: ${RABBITMQ_PASS}

      USE_ELASTICSEARCH: ${USE_ELASTICSEARCH:-true}
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST:-es:9200}
      MEMCACHED_SERVERS: ${MEMCACHED_SERVERS:-memcached:11211}

      KOHA_SETUP_FAIL_FAST: ${KOHA_SETUP_FAIL_FAST:-false}
      KOHA_SETUP_REQUIRED_STEPS: ${KOHA_SETUP_REQUIRED_STEPS:-00-env-checks.sh}
      KOHA_SETUP_SKIP_STEPS: ${KOHA_SETUP_SKIP_STEPS:-}
      KOHA_SETUP_ONLY_STEPS: ${KOHA_SETUP_ONLY_STEPS:-}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      memcached:
        condition: service_started
      es:
        condition: service_healthy
    volumes:
      - ${VOL_KOHA_CONF}:/etc/koha/sites
      - ${VOL_KOHA_CONF}/${KOHA_INSTANCE}:/etc/koha/sites/default
      - ${VOL_KOHA_DATA}:/var/lib/koha
      - ${VOL_KOHA_LOGS}:/var/log/koha
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${KOHA_INTRANET_PORT:-8081} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: ${MARIADB_IMAGE:-docker.io/mariadb:11}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --server-id=${DB_SERVER_ID:-1}
      - --log-bin=${DB_LOG_BIN_BASENAME:-mysql-bin}
      - --binlog-format=${DB_BINLOG_FORMAT:-ROW}
      - --binlog-row-image=${DB_BINLOG_ROW_IMAGE:-FULL}
      - --sync-binlog=${DB_SYNC_BINLOG:-1}
      - --expire-logs-days=${DB_BINLOG_EXPIRE_DAYS:-7}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: ${DB_MEM_LIMIT:-2g}
    cpus: ${DB_CPUS:-1.50}
    networks:
      - kohanet
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
      TZ: ${KOHA_TIMEZONE}
    volumes:
      - ${VOL_DB_PATH}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  rabbitmq:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
      args:
        RABBITMQ_VERSION: ${RABBITMQ_VERSION:-3-management}
    image: ${RABBITMQ_IMAGE:-koha-local-rabbitmq:3-management}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: ${RABBITMQ_MEM_LIMIT:-512m}
    cpus: ${RABBITMQ_CPUS:-1.00}
    networks:
      - kohanet
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  es:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
      args:
        ES_VERSION: ${ES_VERSION:-8.19.6}
    image: ${ES_IMAGE:-koha-local-es:8.19.6}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: ${ES_MEM_LIMIT:-1g}
    cpus: ${ES_CPUS:-1.00}
    cap_drop:
      - ALL
    networks:
      - kohanet
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      TZ: ${KOHA_TIMEZONE}
    volumes:
      - ${VOL_ES_PATH}:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  memcached:
    build:
      context: ./memcached
      dockerfile: Dockerfile
      args:
        MEMCACHED_VERSION: ${MEMCACHED_VERSION:-1.6}
    image: ${MEMCACHED_IMAGE:-koha-local-memcached:1.6}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: ${MEMCACHED_MEM_LIMIT:-256m}
    cpus: ${MEMCACHED_CPUS:-0.50}
    cap_drop:
      - ALL
    networks:
      - kohanet

  tunnel:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.2.0}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: ${TUNNEL_MEM_LIMIT:-128m}
    cpus: ${TUNNEL_CPUS:-0.25}
    cap_drop:
      - ALL
    networks:
      - kohanet
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TOKEN}
    command: tunnel run
    depends_on:
      koha:
        condition: service_healthy

networks:
  kohanet:
    driver: bridge
