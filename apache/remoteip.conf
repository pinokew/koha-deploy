# Managed by koha-deploy (config-as-code)
# Purpose: preserve real client IP behind Cloudflare Tunnel -> Traefik proxy chain.

<IfModule remoteip_module>
    # Cloudflare Tunnel forwards original client in CF-Connecting-IP.
    RemoteIPHeader CF-Connecting-IP

    # Trust only internal proxy ranges.
    RemoteIPTrustedProxy 127.0.0.1
    RemoteIPTrustedProxy ::1
    RemoteIPTrustedProxy 10.0.0.0/8
    RemoteIPTrustedProxy 172.16.0.0/12
    RemoteIPTrustedProxy 192.168.0.0/16
</IfModule>
